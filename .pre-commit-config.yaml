repos:
  # Ruff for backend linting and formatting
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.4
    hooks:
      - id: ruff
        files: ^backend/.*\.py$
        args: [--fix]
      - id: ruff-format
        files: ^backend/.*\.py$

  # Semgrep for project-specific conventions
  - repo: https://github.com/semgrep/semgrep
    rev: v1.137.0
    hooks:
      - id: semgrep
        args: [--config, semgrep/, --error]
        files: ^backend/.*\.py$
        exclude: ^backend/alembic/versions/

  # basedpyright for backend type checking
  - repo: local
    hooks:
      - id: basedpyright
        name: basedpyright (local)
        language: system
        entry: bash -lc 'cd backend && uv run basedpyright'
        files: ^backend/.*\.py$
        pass_filenames: false

  # ESLint for landing
  - repo: local
    hooks:
      - id: eslint-landing
        name: ESLint (landing)
        language: system
        entry: bash -lc 'cd landing && pnpm run lint:fix --'
        files: ^landing/.*\.(js|jsx|ts|tsx)$
        exclude: ^landing/(node_modules|.next|out)/
        pass_filenames: false

  # Terraform formatting
  - repo: https://github.com/antonbabenko/pre-commit-terraform
    rev: v1.96.1
    hooks:
      - id: terraform_fmt
        files: ^infra/.*\.tf$

  # ESLint for web
  - repo: local
    hooks:
      - id: eslint-web
        name: ESLint (web)
        language: system
        entry: bash -lc 'cd web && pnpm run lint:fix --'
        files: ^web/.*\.(js|jsx|ts|tsx)$
        exclude: ^web/(node_modules|dist)/
        pass_filenames: false
